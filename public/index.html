<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>STAREDOWN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060d02;--surface:#0b1a05;--border:#1e4a0a;
  --green:#5ddd00;--bright:#aaff00;--red:#ff3c3c;
  --text:#d4f5a0;--muted:#3d6b22;--gold:#ffd700;
  --display:'Bebas Neue',sans-serif;--mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,20,0,.06) 3px,rgba(0,20,0,.06) 4px);pointer-events:none;z-index:9999;}

.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;overflow-y:auto;}
.screen.active{display:flex;}

.logo{font-family:var(--display);font-size:clamp(56px,16vw,100px);color:var(--green);line-height:1;text-align:center;text-shadow:0 0 40px rgba(93,221,0,.35);}
.logo-sub{font-size:10px;letter-spacing:.35em;color:var(--muted);text-align:center;margin-bottom:28px;text-transform:uppercase;}

.btn{display:block;width:100%;max-width:340px;padding:15px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:all .1s;text-align:center;margin-bottom:10px;}
.btn:hover,.btn:active{border-color:var(--green);color:var(--green);}
.btn.primary{background:var(--green);color:#000;border-color:var(--green);}
.btn.primary:active{background:var(--bright);}
.btn.google{border-color:#4285f4;color:#4285f4;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn.google:active{background:rgba(66,133,244,.1);}
.btn.danger{border-color:var(--red);color:var(--red);}
.btn:disabled{opacity:.3;cursor:not-allowed;}

input[type=text],input[type=number]{display:block;width:100%;max-width:340px;background:#060e03;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:15px;padding:13px;outline:none;margin-bottom:10px;}
input:focus{border-color:var(--green);}
input::placeholder{color:var(--muted);}
label{font-size:10px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px;width:100%;max-width:340px;}
.err{color:var(--red);font-size:11px;min-height:16px;width:100%;max-width:340px;margin-bottom:6px;}
.note{color:var(--muted);font-size:11px;width:100%;max-width:340px;margin-bottom:6px;line-height:1.6;}
.divider{border:none;border-top:1px solid var(--border);width:100%;max-width:340px;margin:14px 0;}

/* user pill */
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);margin-bottom:20px;width:100%;max-width:340px;}
.user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--green);}
.user-name{font-size:12px;color:var(--text);flex:1;}
.user-signout{font-size:10px;color:var(--muted);cursor:pointer;letter-spacing:.1em;}
.user-signout:hover{color:var(--red);}

/* code box */
.code-box{border:1px solid var(--green);padding:20px 28px;text-align:center;width:100%;max-width:340px;margin-bottom:16px;}
.code-label{font-size:10px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.code-val{font-family:var(--display);font-size:64px;color:var(--green);line-height:1;text-shadow:0 0 30px rgba(93,221,0,.3);}
.code-note{font-size:11px;color:var(--muted);margin-top:6px;}

.pot-box{border:1px solid var(--green);padding:14px 20px;text-align:center;width:100%;max-width:340px;margin-bottom:12px;position:relative;}
.pot-box::before{content:'TOTAL POT';position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 8px;font-size:9px;letter-spacing:.3em;color:var(--green);}
.pot-val{font-family:var(--display);font-size:44px;color:var(--green);line-height:1;}

.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pdot 1s step-end infinite;}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:0}}

/* section title */
.stitle{font-family:var(--display);font-size:32px;color:var(--green);margin-bottom:16px;width:100%;max-width:340px;}
.back{font-size:11px;letter-spacing:.2em;color:var(--muted);cursor:pointer;align-self:flex-start;margin-bottom:20px;text-transform:uppercase;}
.back:hover{color:var(--green);}

/* leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);width:100%;max-width:340px;}
.lb-rank{font-family:var(--display);font-size:22px;color:var(--muted);width:28px;text-align:center;}
.lb-rank.gold{color:var(--gold);}
.lb-rank.silver{color:#ccc;}
.lb-rank.bronze{color:#cd7f32;}
.lb-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border);}
.lb-info{flex:1;}
.lb-name{font-size:12px;font-weight:700;color:var(--text);}
.lb-stats{font-size:10px;color:var(--muted);margin-top:2px;}
.lb-won{font-family:var(--display);font-size:18px;color:var(--green);}
.lb-title{font-family:var(--display);font-size:36px;color:var(--green);margin-bottom:16px;width:100%;max-width:340px;}

/* camera screen */
#s-camera{padding:0;background:#000;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#canvas{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);}
.hud{position:absolute;inset:0;pointer-events:none;z-index:10;}
.hud-timer{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-family:var(--display);font-size:52px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.8);font-variant-numeric:tabular-nums;}
.hud-pot{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);font-family:var(--display);font-size:26px;color:var(--green);text-shadow:0 0 20px rgba(93,221,0,.5);white-space:nowrap;}
.hud-name{position:absolute;top:20px;left:14px;font-size:11px;color:rgba(255,255,255,.7);}
.hud-opp{position:absolute;top:20px;right:14px;font-size:11px;color:rgba(255,255,255,.7);}
.eye-indicator{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;}
.eye-ring{width:52px;height:52px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;transition:all .1s;}
.eye-ring.open{border-color:var(--green);box-shadow:0 0 20px rgba(93,221,0,.4);}
.eye-ring.closed{transform:scaleY(.08);border-color:var(--red);}
.eye-dot{width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .1s;}
.eye-ring.closed .eye-dot{transform:scale(0);}
.eye-label{font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.6);text-transform:uppercase;}
#countdown-overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:20;}
#cd-num{font-family:var(--display);font-size:clamp(120px,35vw,200px);color:var(--green);text-shadow:0 0 60px rgba(93,221,0,.5);animation:cpulse .8s ease-in-out infinite alternate;}
@keyframes cpulse{from{opacity:1}to{opacity:.4}}
#blink-flash{position:absolute;inset:0;background:var(--red);opacity:0;z-index:30;pointer-events:none;transition:opacity .05s;}

/* result */
.result-box{border:1px solid var(--green);padding:24px 20px;width:100%;max-width:340px;text-align:center;margin-bottom:12px;}
.res-label{font-size:10px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.res-winner{font-family:var(--display);font-size:clamp(44px,12vw,72px);color:var(--green);line-height:1;text-shadow:0 0 30px rgba(93,221,0,.4);}
.res-prize{font-family:var(--display);font-size:32px;color:#00ff88;margin-bottom:8px;}
.res-detail{font-size:11px;color:var(--muted);}

/* invite */
.invite-box{border:1px solid var(--border);padding:14px;width:100%;max-width:340px;margin-bottom:10px;}
.invite-label{font-size:9px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.invite-link{font-size:12px;color:var(--green);word-break:break-all;}

/* player status */
.player-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);width:100%;max-width:340px;margin-bottom:8px;}
.p-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border);}
.p-name{flex:1;font-size:12px;}
.p-status{font-size:10px;letter-spacing:.1em;}
.p-status.paid{color:var(--green);}
.p-status.waiting{color:var(--muted);}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div class="logo">STARE<br>DOWN</div>
  <div class="logo-sub">Winner takes all</div>
  <div id="home-auth">
    <button class="btn google" onclick="signInGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>
  <div id="home-loggedin" style="display:none;width:100%;max-width:340px;">
    <div class="user-pill">
      <img class="user-avatar" id="home-avatar" src="" alt=""/>
      <span class="user-name" id="home-username"></span>
      <span class="user-signout" onclick="signOut()">Sign out</span>
    </div>
    <button class="btn primary" onclick="goTo('s-create')">Create Game</button>
    <button class="btn" onclick="goTo('s-join')">Join Game</button>
    <button class="btn" onclick="loadLeaderboard()">Leaderboard</button>
  </div>
</div>

<!-- CREATE -->
<div class="screen" id="s-create">
  <span class="back" onclick="goTo('s-home')">← Back</span>
  <div class="stitle">Create</div>
  <label>Deposit amount ($)</label>
  <input type="number" id="c-dep" placeholder="e.g. 10" min="1" step="1"/>
  <div class="err" id="c-err"></div>
  <button class="btn primary" onclick="doCreate()">Create Room →</button>
</div>

<!-- JOIN -->
<div class="screen" id="s-join">
  <span class="back" onclick="goTo('s-home')">← Back</span>
  <div class="stitle">Join</div>
  <label>Room code</label>
  <input type="text" id="j-code" placeholder="4-letter code" maxlength="4" style="text-transform:uppercase;letter-spacing:.2em;font-size:20px;"/>
  <label>Deposit ($)</label>
  <input type="number" id="j-dep" placeholder="e.g. 10" min="1" step="1"/>
  <div class="err" id="j-err"></div>
  <button class="btn primary" onclick="doJoin()">Join Room →</button>
</div>

<!-- WAITING (before payment) -->
<div class="screen" id="s-wait">
  <div class="code-box">
    <div class="code-label">Room Code</div>
    <div class="code-val" id="w-code">——</div>
    <div class="code-note">Share with your opponent</div>
  </div>
  <div class="pot-box">
    <div class="pot-val" id="w-pot">$0.00</div>
  </div>
  <div id="w-players" style="width:100%;max-width:340px;"></div>
  <div style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;margin-top:8px;" id="w-msg">
    <span class="pulse-dot"></span> Waiting for both players to pay...
  </div>
  <button class="btn primary" id="w-pay-btn" onclick="doPay()" style="margin-top:16px;">Pay Deposit →</button>
  <p class="note" style="text-align:center;">You'll be redirected to Stripe to pay securely.</p>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="s-leaderboard">
  <span class="back" onclick="goTo('s-home')">← Back</span>
  <div class="lb-title">Leaderboard</div>
  <div id="lb-list" style="width:100%;max-width:340px;"></div>
</div>

<!-- CAMERA -->
<div class="screen" id="s-camera">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="hud">
    <div class="hud-name" id="hud-myname"></div>
    <div class="hud-opp" id="hud-oppname"></div>
    <div class="hud-timer" id="hud-timer">0.0s</div>
    <div class="hud-pot" id="hud-pot"></div>
    <div class="eye-indicator">
      <div class="eye-ring open" id="eye-ring"><div class="eye-dot"></div></div>
      <div class="eye-label">Your eyes</div>
    </div>
  </div>
  <div id="countdown-overlay"><div id="cd-num">3</div></div>
  <div id="blink-flash"></div>
</div>

<!-- RESULT -->
<div class="screen" id="s-result">
  <div class="result-box">
    <div class="res-label">Winner</div>
    <div class="res-winner" id="r-winner">—</div>
    <div class="res-prize" id="r-prize"></div>
    <div class="res-detail" id="r-detail"></div>
  </div>
  <div class="invite-box">
    <div class="invite-label">Challenge a friend</div>
    <div class="invite-link" id="invite-link"></div>
  </div>
  <button class="btn primary" onclick="shareInvite()" style="margin-bottom:8px;">Share Invite Link</button>
  <button class="btn" onclick="goTo('s-home')">Play Again</button>
  <button class="btn" onclick="loadLeaderboard()">View Leaderboard</button>
</div>

<!-- Firebase + MediaPipe + Socket.io -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="/socket.io/socket.io.js"></script>

<script>
// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCkVAnzQQQbhJTgx8C3tPvec292zepLfRc",
  authDomain: "staredown-2026.firebaseapp.com",
  projectId: "staredown-2026",
  storageBucket: "staredown-2026.firebasestorage.app",
  messagingSenderId: "30073503048",
  appId: "1:30073503048:web:da291e4ef4a04e9a0ac77d",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let idToken = null;

auth.onAuthStateChanged(async user => {
  currentUser = user;
  if (user) {
    idToken = await user.getIdToken();
    document.getElementById('home-auth').style.display = 'none';
    document.getElementById('home-loggedin').style.display = 'block';
    document.getElementById('home-avatar').src = user.photoURL || '';
    document.getElementById('home-username').textContent = user.displayName || user.email;
    checkUrlParams();
  } else {
    document.getElementById('home-auth').style.display = 'block';
    document.getElementById('home-loggedin').style.display = 'none';
  }
});

function signInGoogle() {
  auth.signInWithPopup(provider);
}

function signOut() {
  auth.signOut();
  goTo('s-home');
}

// ── Screen routing ────────────────────────────────────────────────────────────
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── URL params (after Stripe redirect) ───────────────────────────────────────
function checkUrlParams() {
  const p = new URLSearchParams(window.location.search);
  const room = p.get('room');
  const paid = p.get('paid');
  const cancelled = p.get('cancelled');

  if (cancelled) {
    alert('Payment cancelled.');
    window.history.replaceState({}, '', '/');
    return;
  }

  if (room && paid) {
    window.history.replaceState({}, '', '/');
    currentRoom = room;
    connectSocket(() => {
      socket.emit('rejoin_room', { code: room, userId: currentUser.uid });
    });
    goTo('s-wait');
    document.getElementById('w-code').textContent = room;
    document.getElementById('w-pay-btn').style.display = 'none';
    document.getElementById('w-msg').innerHTML = '<span class="pulse-dot"></span> Payment confirmed! Waiting for opponent...';
  }
}

// ── Socket ────────────────────────────────────────────────────────────────────
let socket = null;
let currentRoom = null;
let myPlayerIndex = null;
let gameNames = ['', ''];
let gamePot = 0;
let myDeposit = 0;

function connectSocket(cb) {
  if (socket) { socket.disconnect(); socket = null; }
  socket = io({ reconnection: false });
  socket.on('connect', () => { if (cb) cb(); });
  socket.on('connect_error', () => alert('Connection failed. Please refresh.'));
  socket.on('error', msg => alert('Error: ' + msg));

  socket.on('room_created', ({ code, playerIndex }) => {
    myPlayerIndex = playerIndex;
    currentRoom = code;
    document.getElementById('w-code').textContent = code;
    updateWaitPlayers();
    goTo('s-wait');
  });

  socket.on('room_joined', ({ playerIndex, players, pot }) => {
    myPlayerIndex = playerIndex;
    gamePot = pot;
    document.getElementById('w-pot').textContent = fmt(pot);
    updateWaitPlayers(players);
    goTo('s-wait');
  });

  socket.on('opponent_joined', ({ name, photo }) => {
    updateWaitPlayers();
    document.getElementById('w-msg').innerHTML = '<span class="pulse-dot"></span> Opponent joined! Both players need to pay.';
  });

  socket.on('player_paid', ({ playerIndex, name, pot }) => {
    gamePot = pot;
    document.getElementById('w-pot').textContent = fmt(pot);
    document.getElementById('w-msg').innerHTML = `<span class="pulse-dot"></span> ${name} paid! Waiting...`;
  });

  socket.on('room_state', ({ playerIndex, players, pot, state, code }) => {
    myPlayerIndex = playerIndex;
    gamePot = pot;
    currentRoom = code;
    document.getElementById('w-code').textContent = code;
    document.getElementById('w-pot').textContent = fmt(pot);
    if (state === 'countdown' || state === 'contest') {
      startCameraAndCountdown();
    }
  });

  socket.on('start_countdown', ({ names, pot }) => {
    gameNames = names;
    gamePot = pot;
    startCameraAndCountdown();
  });

  socket.on('contest_start', () => beginContest());

  socket.on('game_over', async ({ winnerIndex, loserIndex, winnerName, loserName, pot, roomCode }) => {
    stopContest();
    const iWon = winnerIndex === myPlayerIndex;

    document.getElementById('r-winner').textContent = winnerName;
    document.getElementById('r-winner').style.color = iWon ? 'var(--green)' : 'var(--red)';
    document.getElementById('r-prize').textContent = fmt(pot) + (iWon ? ' is yours!' : ' lost');
    document.getElementById('r-detail').textContent = loserName + ' blinked. ' + (iWon ? '🎉 Collect your cash!' : 'Better luck next time.');

    const inviteUrl = `${window.location.origin}?join=${roomCode}`;
    document.getElementById('invite-link').textContent = inviteUrl;
    window.currentInviteUrl = inviteUrl;

    goTo('s-result');

    // Trigger payout on server
    try {
      idToken = await currentUser.getIdToken(true);
      await fetch('/api/payout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
        body: JSON.stringify({ roomCode }),
      });
    } catch(e) { console.error('Payout error:', e); }
  });

  socket.on('opponent_left', () => {
    stopContest();
    alert('Opponent disconnected. Game cancelled.');
    goTo('s-home');
  });
}

// ── Create / Join ─────────────────────────────────────────────────────────────
function doCreate() {
  const dep = parseFloat(document.getElementById('c-dep').value);
  const err = document.getElementById('c-err');
  err.textContent = '';
  if (!dep || dep < 1) { err.textContent = 'Min deposit $1'; return; }
  myDeposit = Math.round(dep * 100);
  err.style.color = 'var(--muted)';
  err.textContent = 'Connecting...';
  connectSocket(() => {
    err.textContent = '';
    socket.emit('create_room', {
      userId: currentUser.uid,
      name: currentUser.displayName,
      photo: currentUser.photoURL,
      deposit: myDeposit,
    });
  });
}

function doJoin() {
  const code = document.getElementById('j-code').value.trim().toUpperCase();
  const dep = parseFloat(document.getElementById('j-dep').value);
  const err = document.getElementById('j-err');
  err.textContent = '';
  if (!code || code.length < 4) { err.textContent = 'Enter 4-letter code'; return; }
  if (!dep || dep < 1) { err.textContent = 'Min deposit $1'; return; }
  myDeposit = Math.round(dep * 100);
  err.style.color = 'var(--muted)';
  err.textContent = 'Connecting...';
  connectSocket(() => {
    err.textContent = '';
    socket.emit('join_room', {
      code,
      userId: currentUser.uid,
      name: currentUser.displayName,
      photo: currentUser.photoURL,
      deposit: myDeposit,
    });
  });
}

// ── Payment ───────────────────────────────────────────────────────────────────
async function doPay() {
  const btn = document.getElementById('w-pay-btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  try {
    idToken = await currentUser.getIdToken(true);
    const res = await fetch('/api/deposit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
      body: JSON.stringify({ roomCode: currentRoom, amount: myDeposit }),
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert(data.error || 'Payment failed');
      btn.disabled = false;
      btn.textContent = 'Pay Deposit →';
    }
  } catch(e) {
    alert('Payment error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Pay Deposit →';
  }
}

// ── Wait screen helpers ───────────────────────────────────────────────────────
function updateWaitPlayers(players) {
  const el = document.getElementById('w-players');
  if (!players) return;
  el.innerHTML = players.map(p => `
    <div class="player-row">
      <img class="p-avatar" src="${p.photo || ''}" onerror="this.src=''" alt=""/>
      <span class="p-name">${p.name}</span>
      <span class="p-status ${p.paid ? 'paid' : 'waiting'}">${p.paid ? '✓ Paid' : 'Not paid'}</span>
    </div>
  `).join('');
}

function fmt(cents) {
  return '$' + (cents / 100).toFixed(2);
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
async function loadLeaderboard() {
  goTo('s-leaderboard');
  const el = document.getElementById('lb-list');
  el.innerHTML = '<p style="color:var(--muted);font-size:12px;">Loading...</p>';
  try {
    const res = await fetch('/api/leaderboard');
    const data = await res.json();
    if (!data.length) { el.innerHTML = '<p style="color:var(--muted);font-size:12px;">No games played yet!</p>'; return; }
    const rankClass = r => r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : '';
    el.innerHTML = data.map((u, i) => `
      <div class="lb-row">
        <div class="lb-rank ${rankClass(i+1)}">${i+1}</div>
        <img class="lb-avatar" src="${u.photo || ''}" onerror="this.src=''" alt=""/>
        <div class="lb-info">
          <div class="lb-name">${u.name}</div>
          <div class="lb-stats">${u.wins}W ${u.losses}L · ${u.gamesPlayed} games</div>
        </div>
        <div class="lb-won">${fmt(u.totalWon)}</div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = '<p style="color:var(--red);font-size:12px;">Failed to load</p>';
  }
}

// ── Invite ────────────────────────────────────────────────────────────────────
function shareInvite() {
  const url = window.currentInviteUrl;
  if (navigator.share) {
    navigator.share({ title: 'Play Staredown!', text: "I dare you to a staring contest — winner takes the cash 👀", url });
  } else {
    navigator.clipboard.writeText(url);
    alert('Link copied!');
  }
}

// Check if joining via invite link
window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(window.location.search);
  const joinCode = p.get('join');
  if (joinCode) {
    window.history.replaceState({}, '', '/');
    document.getElementById('j-code').value = joinCode;
    // Wait for auth then go to join screen
    auth.onAuthStateChanged(user => {
      if (user) goTo('s-join');
    });
  }
});

// ── MediaPipe ─────────────────────────────────────────────────────────────────
const L_EYE = [362,385,387,263,373,380];
const R_EYE = [33,160,158,133,153,144];
let faceMesh = null, camera = null;
let contestActive = false, blinkSent = false;
let timerInterval = null, startTime = null;
const EAR_THRESHOLD = 0.21;
const BLINK_FRAMES = 2;
let closedFrames = 0;

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function ear(lm,idx){const[p1,p2,p3,p4,p5,p6]=idx.map(i=>lm[i]);return(dist(p2,p6)+dist(p3,p5))/(2*dist(p1,p4));}

function onFaceResults(results) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = results.image.width;
  canvas.height = results.image.height;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!results.multiFaceLandmarks?.length){updateEyeRing(false);return;}
  const lm = results.multiFaceLandmarks[0];
  const W=canvas.width,H=canvas.height;
  let minX=1,minY=1,maxX=0,maxY=0;
  lm.forEach(p=>{if(p.x<minX)minX=p.x;if(p.y<minY)minY=p.y;if(p.x>maxX)maxX=p.x;if(p.y>maxY)maxY=p.y;});
  const pad=0.04;
  ctx.strokeStyle='#5ddd00';ctx.lineWidth=1.5;
  ctx.strokeRect((minX-pad)*W,(minY-pad)*H,(maxX-minX+2*pad)*W,(maxY-minY+2*pad)*H);
  const earVal=(ear(lm,L_EYE)+ear(lm,R_EYE))/2;
  const closed=earVal<EAR_THRESHOLD;
  updateEyeRing(!closed);
  if(!contestActive||blinkSent)return;
  if(closed){closedFrames++;if(closedFrames>=BLINK_FRAMES){blinkSent=true;flashRed();socket.emit('blinked');}}
  else{closedFrames=0;}
}

function updateEyeRing(open){document.getElementById('eye-ring').className='eye-ring '+(open?'open':'closed');}
function flashRed(){const f=document.getElementById('blink-flash');f.style.opacity='0.7';setTimeout(()=>f.style.opacity='0',300);}

async function startCameraAndCountdown() {
  goTo('s-camera');
  document.getElementById('hud-myname').textContent = currentUser?.displayName || '';
  document.getElementById('hud-oppname').textContent = gameNames[myPlayerIndex===0?1:0] || '';
  document.getElementById('hud-pot').textContent = fmt(gamePot);
  document.getElementById('hud-timer').textContent = '0.0s';
  document.getElementById('countdown-overlay').style.display = 'flex';

  const video = document.getElementById('video');
  faceMesh = new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  faceMesh.onResults(onFaceResults);
  camera = new Camera(video,{onFrame:async()=>{await faceMesh.send({image:video});},width:640,height:480,facingMode:'user'});
  await camera.start();

  let n=3;
  const el=document.getElementById('cd-num');
  el.textContent=n;el.style.color='var(--green)';
  const iv=setInterval(()=>{
    n--;
    if(n<=0){clearInterval(iv);el.textContent='GO!';el.style.color='#00ff88';setTimeout(()=>{document.getElementById('countdown-overlay').style.display='none';socket.emit('contest_ready');},700);}
    else el.textContent=n;
  },1000);
}

function beginContest(){contestActive=true;blinkSent=false;closedFrames=0;startTime=Date.now();timerInterval=setInterval(()=>{document.getElementById('hud-timer').textContent=((Date.now()-startTime)/1000).toFixed(1)+'s';},100);}
function stopContest(){contestActive=false;clearInterval(timerInterval);if(camera){camera.stop();camera=null;}if(faceMesh){faceMesh.close();faceMesh=null;}}
</script>
